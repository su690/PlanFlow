# ─── Redpanda (single-node, dev only) ───────────────────────────────────────
# For production replace with Strimzi — see docs/k8s-kafka-notes.md §4.
#
# Bootstrap address inside the cluster: PLAINTEXT://kafka:9092
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  labels:
    app: redpanda
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
      - name: redpanda
        image: docker.redpanda.com/redpandadata/redpanda:v23.1.11
        args:
          - redpanda
          - start
          - --overprovisioned
          - --smp
          - "1"
          - --memory
          - "512M"
          - --reserve-memory
          - "0M"
          - --node-id
          - "0"
          - --check=false
          - --kafka-addr
          - PLAINTEXT://0.0.0.0:9092
          - --advertise-kafka-addr
          - PLAINTEXT://kafka:9092
        ports:
        - containerPort: 9092
          name: kafka
        resources:
          limits:
            memory: "768Mi"
            cpu: "500m"
          requests:
            memory: "512Mi"
            cpu: "250m"
        readinessProbe:
          exec:
            command: ["rpk", "cluster", "info", "--brokers", "localhost:9092"]
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 5
        livenessProbe:
          exec:
            command: ["rpk", "cluster", "info", "--brokers", "localhost:9092"]
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 3
        volumeMounts:
        - name: redpanda-data
          mountPath: /var/lib/redpanda/data
  volumeClaimTemplates:
  - metadata:
      name: redpanda-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi
---
# Headless service — in-cluster name: kafka:9092
apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels:
    app: redpanda
spec:
  clusterIP: None
  selector:
    app: redpanda
  ports:
  - port: 9092
    targetPort: 9092
    name: kafka
---
# NodePort for local cluster access (minikube / kind)
apiVersion: v1
kind: Service
metadata:
  name: kafka-external
  labels:
    app: redpanda
spec:
  type: NodePort
  selector:
    app: redpanda
  ports:
  - port: 9092
    targetPort: 9092
    nodePort: 30092
    name: kafka
